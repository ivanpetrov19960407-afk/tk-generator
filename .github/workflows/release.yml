name: release

on:
  release:
    types: [published]

jobs:
  docker-ghcr:
    name: Build and push Docker image (GHCR)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/tk-generator
          tags: |
            type=raw,value=latest
            type=ref,event=tag

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-windows-binary:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Run test suite
        run: npm test

      - name: Build standalone binary
        run: npm run build:binary

      - name: Smoke test executable
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist\smoke-output -Force | Out-Null
          .\dist\tk-generator.exe --input examples\batch_small.json --output dist\smoke-output --rkm
          if (-not (Get-ChildItem dist\smoke-output\*.docx -ErrorAction SilentlyContinue)) {
            throw 'DOCX output was not generated by the executable.'
          }
          if (-not (Get-ChildItem dist\smoke-output\*.xlsx -ErrorAction SilentlyContinue)) {
            throw 'XLSX output was not generated by the executable.'
          }

      - name: Archive distribution
        run: Compress-Archive -Path dist\* -DestinationPath tk-generator-windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tk-generator-windows-x64
          path: tk-generator-windows-x64.zip

      - name: Attach binary archive to release
        uses: softprops/action-gh-release@v2
        with:
          files: tk-generator-windows-x64.zip

  build-electron:
    name: Build Electron (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            cmd: npm run desktop:build
            artifact_glob: dist-electron/*.exe
          - os: macos-latest
            cmd: npm run desktop:build:mac
            artifact_glob: dist-electron/*.dmg
          - os: ubuntu-latest
            cmd: npm run desktop:build:linux
            artifact_glob: dist-electron/*.AppImage

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install desktop dependencies
        run: npm --prefix desktop install

      - name: Run Electron launch test
        run: npm run test:electron

      - name: Build Electron package
        run: ${{ matrix.cmd }}

      - name: Upload Electron artifact
        uses: actions/upload-artifact@v4
        with:
          name: electron-${{ matrix.os }}
          path: ${{ matrix.artifact_glob }}

      - name: Attach Electron package to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_glob }}
