name: release

on:
  release:
    types: [published]

jobs:
  build-windows-binary:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Run test suite
        run: npm test

      - name: Build standalone binary
        run: npm run build:binary

      - name: Smoke test executable
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist\smoke-output -Force | Out-Null
          .\dist\tk-generator.exe --input examples\batch_small.json --output dist\smoke-output --rkm
          if (-not (Get-ChildItem dist\smoke-output\*.docx -ErrorAction SilentlyContinue)) {
            throw 'DOCX output was not generated by the executable.'
          }
          if (-not (Get-ChildItem dist\smoke-output\*.xlsx -ErrorAction SilentlyContinue)) {
            throw 'XLSX output was not generated by the executable.'
          }

      - name: Archive distribution
        run: Compress-Archive -Path dist\* -DestinationPath tk-generator-windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tk-generator-windows-x64
          path: tk-generator-windows-x64.zip

      - name: Attach binary archive to release
        uses: softprops/action-gh-release@v2
        with:
          files: tk-generator-windows-x64.zip
