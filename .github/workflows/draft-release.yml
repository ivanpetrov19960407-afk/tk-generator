name: draft-release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  draft-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create draft release with autogenerated notes
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
