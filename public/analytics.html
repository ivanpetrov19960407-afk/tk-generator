<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Аналитика себестоимости</title>
  <script src="/vendor/chart.min.js"></script>
  <script src="/vendor/html2canvas.min.js"></script>
  <script src="/vendor/jspdf.umd.min.js"></script>
  <style>
    :root {
      --bg-app: #F0F2F5;
      --bg-card: #FFFFFF;
      --text-primary: #1A1A2E;
      --text-secondary: #6B7280;
      --accent: #1565C0;
      --border: #E5E7EB;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-app: #0D1117;
        --bg-card: #161B22;
        --text-primary: #E6EDF3;
        --text-secondary: #9CA3AF;
        --border: #30363D;
      }
    }
    body { font-family: "Segoe UI", Roboto, Arial, sans-serif; margin: 0; padding: 20px; background: var(--bg-app); color: var(--text-primary); }
    .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; gap: 12px; }
    .topbar a { color: var(--accent); text-decoration: none; font-weight: 600; }
    .filters { display: grid; grid-template-columns: repeat(5, minmax(140px, 1fr)); gap: 8px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 12px; box-shadow: var(--shadow); }
    .card-grid { margin-top: 12px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .card, .chart-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 12px; box-shadow: var(--shadow); }
    .charts { margin-top: 12px; display: grid; grid-template-columns: 2fr 1fr; gap: 10px; }
    .charts-bottom { margin-top: 10px; display:grid; grid-template-columns: 1fr 1fr; gap:10px; }
    .metric { font-size: 24px; font-weight: 700; margin-top: 4px; }
    label { font-size: 12px; color: var(--text-secondary); }
    input, select, button { width: 100%; box-sizing: border-box; padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-primary); }
    button { cursor: pointer; background: var(--accent); color: #fff; border-color: transparent; }
    .actions { display: flex; gap: 8px; align-items: end; }
    @media (max-width: 980px) {
      .filters { grid-template-columns: repeat(2, 1fr); }
      .card-grid, .charts, .charts-bottom { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>Дашборд себестоимости</h1>
    <a href="/index.html#analytics">← Вернуться</a>
  </div>

  <div id="dashboardRoot">
    <div class="filters">
      <div><label>Дата с</label><input type="date" id="fromDate"></div>
      <div><label>Дата по</label><input type="date" id="toDate"></div>
      <div><label>Материал</label><input type="text" id="materialFilter" placeholder="Напр. Гранит"></div>
      <div><label>Фактура</label><input type="text" id="textureFilter" placeholder="Напр. лощение"></div>
      <div class="actions">
        <button id="applyBtn">Применить</button>
        <button id="pdfBtn">Экспорт PDF</button>
        <button id="csvBtn">Экспорт CSV</button>
      </div>
    </div>

    <div class="card-grid">
      <div class="card"><div>Генераций</div><div id="totalGenerations" class="metric">0</div></div>
      <div class="card"><div>Изделий</div><div id="totalProducts" class="metric">0</div></div>
      <div class="card"><div>Средняя себестоимость</div><div id="avgCost" class="metric">0 ₽</div></div>
      <div class="card"><div>Топ материал</div><div id="topMaterial" class="metric" style="font-size:18px;">—</div></div>
    </div>

    <div class="charts">
      <div class="chart-card">
        <h3>Тренд себестоимости</h3>
        <select id="groupBy" style="max-width:180px; margin-bottom:8px;">
          <option value="day">По дням</option>
          <option value="week">По неделям</option>
        </select>
        <canvas id="trendChart" height="120"></canvas>
      </div>
      <div class="chart-card">
        <h3>Материалы (топ)</h3>
        <canvas id="materialsChart" height="180"></canvas>
      </div>
    </div>

    <div class="charts-bottom">
      <div class="chart-card">
        <h3>Распределение по фактурам</h3>
        <canvas id="texturesChart" height="110"></canvas>
      </div>
      <div class="chart-card">
        <h3>Стоимость по операциям</h3>
        <canvas id="operationsChart" height="110"></canvas>
      </div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('tkg_access_token') || '';
    const authHeaders = token ? { Authorization: `Bearer ${token}` } : {};
    const fmtMoney = (value) => `${new Intl.NumberFormat('ru-RU', { maximumFractionDigits: 2 }).format(Number(value || 0))} ₽`;
    let dashboardSummary = null;

    let trendChart; let materialsChart; let texturesChart; let operationsChart;

    function buildQuery() {
      const query = new URLSearchParams();
      const from = document.getElementById('fromDate').value;
      const to = document.getElementById('toDate').value;
      const material = document.getElementById('materialFilter').value.trim();
      const texture = document.getElementById('textureFilter').value.trim();
      const groupBy = document.getElementById('groupBy').value;
      if (from) query.set('from', `${from}T00:00:00.000Z`);
      if (to) query.set('to', `${to}T23:59:59.999Z`);
      if (material) query.set('material', material);
      if (texture) query.set('texture', texture);
      if (groupBy) query.set('groupBy', groupBy);
      return query;
    }

    async function apiGet(path, query) {
      const res = await fetch(`${path}?${query.toString()}`, { headers: authHeaders });
      const body = await res.json();
      if (!res.ok) throw new Error(body.error || 'Ошибка API');
      return body;
    }

    function drawOrUpdateChart(chart, ctx, type, data, options) {
      if (chart) {
        chart.data = data;
        chart.config.options = options || {};
        chart.update();
        return chart;
      }
      return new Chart(ctx, { type, data, options });
    }

    function downloadCsv(summary, query) {
      const rows = [
        ['metric', 'value'],
        ['total_generations', summary.total_generations || 0],
        ['total_products', summary.total_products || 0],
        ['average_cost', Number(summary.average_cost || 0).toFixed(2)],
        ['total_cost', Number(summary.total_cost || 0).toFixed(2)],
        ['top_material', summary.top_material || '']
      ];
      rows.push(['filters', query.toString()]);
      const csv = rows.map((line) => line.map((x) => `"${String(x).replace(/"/g, '""')}"`).join(',')).join('\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `analytics-summary-${new Date().toISOString().slice(0, 10)}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    }

    async function refreshDashboard() {
      const query = buildQuery();
      const [summary, trends, materials, textures, operations] = await Promise.all([
        apiGet('/api/analytics/summary', query),
        apiGet('/api/analytics/cost-trends', query),
        apiGet('/api/analytics/materials', query),
        apiGet('/api/analytics/textures', query),
        apiGet('/api/analytics/operations', query)
      ]);
      dashboardSummary = summary;
      const topMaterial = (materials.items || [])[0];
      summary.top_material = topMaterial ? topMaterial.material : '—';

      document.getElementById('totalGenerations').textContent = summary.total_generations || 0;
      document.getElementById('totalProducts').textContent = summary.total_products || 0;
      document.getElementById('avgCost').textContent = fmtMoney(summary.average_cost || 0);
      document.getElementById('topMaterial').textContent = summary.top_material || '—';

      trendChart = drawOrUpdateChart(trendChart, document.getElementById('trendChart'), 'line', {
        labels: (trends.items || []).map((x) => x.bucket),
        datasets: [{ label: 'Средняя себестоимость', data: (trends.items || []).map((x) => x.average_cost), borderColor: '#1f77b4', backgroundColor: 'rgba(31,119,180,.15)', tension: 0.25, fill: true }]
      }, { responsive: true, maintainAspectRatio: false });

      materialsChart = drawOrUpdateChart(materialsChart, document.getElementById('materialsChart'), 'pie', {
        labels: (materials.items || []).map((x) => x.material),
        datasets: [{ label: 'Материалы', data: (materials.items || []).map((x) => x.total_cost) }]
      }, { responsive: true, maintainAspectRatio: false });

      texturesChart = drawOrUpdateChart(texturesChart, document.getElementById('texturesChart'), 'bar', {
        labels: (textures.items || []).map((x) => x.texture),
        datasets: [{ label: 'Количество изделий', data: (textures.items || []).map((x) => x.products), backgroundColor: '#6a5acd' }]
      }, { responsive: true, maintainAspectRatio: false });

      operationsChart = drawOrUpdateChart(operationsChart, document.getElementById('operationsChart'), 'bar', {
        labels: (operations.items || []).map((x) => x.operation),
        datasets: [{ label: 'Стоимость', data: (operations.items || []).map((x) => x.total_cost), backgroundColor: '#2E7D32' }]
      }, { responsive: true, maintainAspectRatio: false, indexAxis: 'y' });
    }

    async function exportPdf() {
      const node = document.getElementById('dashboardRoot');
      const canvas = await html2canvas(node, { scale: 2 });
      const img = canvas.toDataURL('image/png');
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF('l', 'mm', 'a4');
      const width = 297;
      const height = (canvas.height * width) / canvas.width;
      pdf.addImage(img, 'PNG', 0, 0, width, Math.min(height, 210));
      pdf.save(`analytics-dashboard-${new Date().toISOString().slice(0, 10)}.pdf`);
    }

    document.getElementById('applyBtn').addEventListener('click', () => refreshDashboard().catch((e) => alert(e.message)));
    document.getElementById('groupBy').addEventListener('change', () => refreshDashboard().catch((e) => alert(e.message)));
    document.getElementById('pdfBtn').addEventListener('click', () => exportPdf().catch((e) => alert(e.message)));
    document.getElementById('csvBtn').addEventListener('click', () => {
      if (!dashboardSummary) return;
      downloadCsv(dashboardSummary, buildQuery());
    });

    refreshDashboard().catch((e) => alert(e.message));
  </script>
</body>
</html>
